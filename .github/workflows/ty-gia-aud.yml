name: Theo dõi tỷ giá AUD

on:
  schedule:
    # 1) 7:00 sáng VN mỗi ngày (0:00 UTC) — LUÔN gửi bản tổng hợp, dù giá có đổi hay không.
    - cron: '0 0 * * *'
    # 2) Mỗi ~20 phút (phút 1, 21, 41), 7h–18h VN (0–11 UTC), Thứ 2–Thứ 7
    #    — chỉ gửi KHI ngân hàng mua cao nhất thay đổi.
    - cron: '1-59/20 0-11 * * 1-6'
  workflow_dispatch:        # cho phép bấm chạy tay để test

permissions:
  contents: write           # để lưu lại state.json (giá lần trước)

concurrency:
  group: theo-doi-ty-gia-aud
  cancel-in-progress: false

jobs:
  kiem-tra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Cài thư viện
        run: pip install -r requirements.txt

      - name: Kiểm tra tỷ giá & gửi Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Lần chạy 7h sáng (cron '0 0 * * *') => FORCE=1 để luôn gửi bản tổng hợp.
          # Các lần khác => FORCE=0, chỉ gửi khi giá cao nhất thay đổi.
          FORCE: ${{ github.event.schedule == '0 0 * * *' && '1' || '0' }}
        run: python kiem_tra_ty_gia.py

      - name: Lưu lại giá mới nhất
        run: |
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git config user.name "github-actions"
            git config user.email "actions@github.com"
            git add state.json
            git commit -m "Cập nhật giá AUD cao nhất"
            git push
          else
            echo "Không có thay đổi để lưu."
          fi
